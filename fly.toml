app = "openclaw-fly-deploy"
primary_region = "bom"

[build]
  image = "ghcr.io/openclaw/openclaw:latest"

[env]
  NODE_ENV = "production"
  OPENCLAW_STATE_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "openclaw_data"
  destination = "/data"
