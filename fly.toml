app = "openclaw-fly-deploy"
primary_region = "bom"

[build]
  image = "ghcr.io/openclaw/openclaw:latest"

[env]
  NODE_ENV = "production"
  OPENCLAW_STATE_DIR = "/data"

[processes]
  app = "gateway run --bind lan --allow-unconfigured --port 8080"

[http_service]
  internal_port = 8080
  force_https = true
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

[mounts]
  source = "openclaw_data"
  destination = "/data"
