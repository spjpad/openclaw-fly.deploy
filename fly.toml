app = "openclaw-fly-deploy"
primary_region = "bom"

[build]
  image = "ghcr.io/openclaw/openclaw:latest"

[env]
  NODE_ENV = "production"
  OPENCLAW_GATEWAY_BIND = "lan"
  OPENCLAW_CONTROLUI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK = "true"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"    # Changed from 256mb to 1GB
